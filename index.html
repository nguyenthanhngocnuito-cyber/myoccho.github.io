<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Của Tài</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212; /* Nền đen sang trọng */
            color: white;
        }
        .profile-card {
            text-align: center;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 350px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin: 10px 0;
            color: #ffffff;
        }
        .status {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="IMG_20260329_172941.jpg" alt="Avatar" class="avatar">
        
        <h1>iêu anh tài chó điên</h1>
        <p class="status">Đang hoạt động</p>
    </div>

</body>
</html>
