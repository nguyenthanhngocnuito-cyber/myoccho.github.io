<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trang Của Tài</title>
    <style>
        /* Tối ưu nền và font chữ */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Khung nội dung chính */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Tối ưu ảnh đại diện */
        .avatar-box {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4ecca3; /* Viền màu xanh neon nhẹ */
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
        }

        /* Dòng chữ yêu cầu */
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 15px 0;
            background: linear-gradient(to right, #4ecca3, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #4ecca3;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .subtitle {
            color: #8892b0;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar-box">
            <img src="./IMG_20260329_172941.jpg" alt="Avatar" class="avatar-img" onerror="this.src='https://via.placeholder.com/180?text=Loi+Anh'">
        </div>
        
        <h1>iêu anh tài chó điên</h1>
        
        <div style="display: flex; align-items: center; justify-content: center;">
            <span class="status-dot"></span>
            <span style="color: #4ecca3; font-weight: 500;">Online Now</span>
        </div>

        <p class="subtitle">© 2026 - Thái Dúi Official</p>
    </div>

  </body>
